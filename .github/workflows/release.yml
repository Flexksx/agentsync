name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (used only for artifact naming when run manually)"
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux,   goarch: amd64, ext: "",     archive: tar.gz }
          - { goos: linux,   goarch: arm64, ext: "",     archive: tar.gz }
          - { goos: darwin,  goarch: amd64, ext: "",     archive: tar.gz }
          - { goos: darwin,  goarch: arm64, ext: "",     archive: tar.gz }
          - { goos: windows, goarch: amd64, ext: ".exe", archive: zip    }
          - { goos: windows, goarch: arm64, ext: ".exe", archive: zip    }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.tag || 'dev' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN="agentsync${{ matrix.target.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${BIN}" \
            ./apps/agentsync

      - name: Package archive
        id: archive
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          VERSION: ${{ steps.version.outputs.version }}
          ARCHIVE_KIND: ${{ matrix.target.archive }}
          BIN_EXT: ${{ matrix.target.ext }}
        run: |
          set -euo pipefail
          NAME="agentsync_${VERSION}_${GOOS}_${GOARCH}"
          STAGE="dist/${NAME}"
          mkdir -p "${STAGE}"
          cp "dist/agentsync${BIN_EXT}" "${STAGE}/"
          cp README.md "${STAGE}/" 2>/dev/null || true
          if [[ "${ARCHIVE_KIND}" == "zip" ]]; then
            ARCHIVE="${NAME}.zip"
            (cd dist && zip -qr "${ARCHIVE}" "${NAME}")
          else
            ARCHIVE="${NAME}.tar.gz"
            tar -C dist -czf "dist/${ARCHIVE}" "${NAME}"
          fi
          (cd dist && sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256")
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentsync-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: |
            dist/${{ steps.archive.outputs.archive }}
            dist/${{ steps.archive.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          set -euo pipefail
          cd dist
          (find . -maxdepth 1 -name '*.sha256' -print0 | xargs -0 cat) > checksums.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

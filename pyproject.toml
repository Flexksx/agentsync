[tool.uv.workspace]
members = ["apps/*", "libs/*"]

[dependency-groups]
dev = [
  "ruff>=0.15.12",
  "ty>=0.0.30",
  "pytest>=9.0.3",
]

[tool.ruff]
line-length = 100
indent-width = 4
target-version = "py314"
extend-exclude = [
  ".eggs",
  ".git",
  ".venv",
  "__pycache__",
  "dist",
  "build",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",
  "I",
  "UP",
  "B",
  "SIM",
  "C4",
  "PIE",
  "T20",
  "RET",
  "ARG",
  "PTH",
  "PL",
  "RUF",
  "TID",
]
ignore = ["PLR0913", "PLR2004", "PLR0911", "PLR0912", "PLR0915"]
fixable = ["ALL"]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F403"]
"tests/*.py" = ["ARG001", "ARG002", "PLR2004"]

[tool.ruff.lint.isort]
known-first-party = ["agentsync"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
split-on-trailing-comma = true
lines-after-imports = 2

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ty.environment]
root = ["apps/agentsync/src", "."]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -v -s --tb=short"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]

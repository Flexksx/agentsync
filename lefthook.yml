pre-commit:
  commands:
    format-nix:
      glob: "**/*.nix"
      run: alejandra {staged_files}
      stage_fixed: true
    format-go:
      glob: "**/*.go"
      run: gofumpt -w {staged_files}
      stage_fixed: true
    lint-go:
      glob: "**/*.go"
      run: golangci-lint run ./...
    vet-go:
      glob: "**/*.go"
      run: go vet ./...
    lint-markdown:
      glob: "**/*.md"
      run: rumdl check --fix {staged_files}
      stage_fixed: true
